services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resurgent-india-aml
    ports:
      - '3000:3000'
    # Values are read from your shell env or a local `.env` file (gitignored).
    # Never hardcode real secrets here.
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    restart: unless-stopped
